version: '3.8'

services:
  campus-moments-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_ENV=production
      - GIN_MODE=release
      - DB_HOST=106.52.165.122
      - DB_PORT=3306
      - DB_NAME=campus_moments
      - DB_USER=workbench_user
      - DB_PASSWORD=ruangong7
      - JWT_SECRET=test-secret-key-123
    volumes:
      - ./.env:/root/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s